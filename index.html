<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <div class="theme-toggle">
        <label class="switch">
          <input type="checkbox" id="theme-switch" />
          <span class="slider"></span>
        </label>
        <span class="label">LIGHT</span>
      </div>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records-section">
          <span class="label">RECORDS</span>
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="records-list"></tbody>
          </table>
          <div class="best-stats">
            <span>Mejor combo: <strong id="best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="max-lines">0</strong></span>
          </div>
          <button id="reset-records-btn" class="reset-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-records" class="overlay-records hidden">
          <p class="new-record-label">¡Nuevo récord!</p>
          <input id="name-input" maxlength="10" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-record-btn">Guardar</button>
        </div>
        <div id="overlay-top-records-wrap" class="overlay-top-records-wrap hidden">
          <span class="label">RECORDS</span>
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="overlay-top-records"></tbody>
          </table>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
